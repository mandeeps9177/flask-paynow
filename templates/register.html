<!DOCTYPE html>
<html>
<head>
    <title>PayNow - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-sm">
        <h1 class="text-2xl font-bold text-gray-800 mb-2 text-center">Create Account</h1>
        <p class="text-center text-sm text-gray-500 mb-6">Join PayNow today</p>

        {% if error %}
        <div class="bg-red-100 text-red-600 text-sm px-4 py-2 rounded mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/register">
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">Full name</label>
                <input type="text" name="name"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="e.g. Mandeep Singh">
            </div>
            <div class="mb-4">
                <label class="block text-sm text-gray-600 mb-1">Phone number</label>
                <input type="text" name="phone"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="e.g. 91234567">
            </div>
            <div class="mb-6">
                <label class="block text-sm text-gray-600 mb-1">Password</label>
                <input type="password" name="password"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"
                    placeholder="Enter password">
            </div>
            <button type="submit"
                class="w-full bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 rounded-lg text-sm transition">
                Create Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-4">
            Already have an account? <a href="/login" class="text-blue-500 hover:underline">Login here</a>
        </p>
    </div>

</body>
</html>
