<!DOCTYPE html>
<html>
<head>
    <title>PayNow - History</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-500">PayNow</h1>
        <a href="/dashboard" class="text-sm text-gray-600 hover:text-blue-500">← Back</a>
    </nav>

    <div class="max-w-2xl mx-auto px-4 py-8">
        <div class="bg-white rounded-xl shadow p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-6">Transaction History</h2>

            {% if transactions %}
                <div class="divide-y">
                {% for t in transactions %}
                <div class="py-3 flex justify-between items-center">
                    <div>
                        <p class="text-sm font-medium text-gray-800">{{ t.other_party }}</p>
                        <p class="text-xs text-gray-400">{{ t.timestamp }}</p>
                    </div>
                    <span class="text-sm font-semibold {% if t.type == 'Sent' %}text-red-500{% else %}text-green-500{% endif %}">
                        {% if t.type == 'Sent' %}-{% else %}+{% endif %}${{ "%.2f"|format(t.amount) }}
                    </span>
                </div>
                {% endfor %}
                </div>
            {% else %}
                <p class="text-sm text-gray-400">No transactions yet.</p>
            {% endif %}
        </div>
    </div>

</body>
</html>
